---
name: stratisd CI on fedora

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'CHANGES.txt'
      - '**/README.md'
      - 'README_tests.md'
      - 'tests/**'
      - '.packit.yaml'
      - 'plans/**'
      - 'tests-fmf/**'
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'CHANGES.txt'
      - '**/README.md'
      - 'README_tests.md'
      - 'tests/**'
      - '.packit.yaml'
      - 'plans/**'
      - 'tests-fmf/**'

  workflow_dispatch:

# cancel the in-progress workflow when PR is refreshed.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  checks:
    strategy:
      matrix:
        include:
          - task: just -f justfile clippy
            components: clippy
          - task: PROFILEDIR=debug just -f justfile stratisd
            components: cargo
          - task: PROFILEDIR=debug just -f justfile build-min
            components: cargo
          - task: PROFILEDIR=debug just -f justfile build-min-no-systemd
            components: cargo
          - task: PROFILEDIR=debug just -f justfile build-utils
            components: cargo
          - task: PROFILEDIR=debug just -f justfile build-no-ipc
            components: cargo
          - task: PROFILEDIR=debug just -f justfile stratisd-tools
            components: cargo
          - task: just -f justfile docs-ci
            components: cargo
          - task: just -f justfile test
            components: cargo
          - task: just -f justfile stratisd
            components: cargo
          - task: just -f justfile build-min
            components: cargo
          - task: just -f justfile build-no-ipc
            components: cargo
    runs-on: ubuntu-24.04
    container:
      image: fedora:43  # CURRENT DEVELOPMENT ENVIRONMENT
      options: --privileged -v /dev:/dev -v /run/udev:/run/udev -v /usr/lib/udev:/usr/lib/udev
    steps:
      - name: Install dependencies for Fedora
        run: >
          dnf install -y
          clang
          curl
          cryptsetup-devel
          device-mapper-persistent-data
          device-mapper-devel
          git
          libblkid-devel
          just
          ncurses
          sudo
          systemd-devel
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: ${{ matrix.components }}
      - name: Overwrite stratisd dependencies as necessary
        uses: stratis-storage/github-actions/stratisd-modify@HEAD
      - name: Test ${{ matrix.task }} on ${{ matrix.toolchain }} toolchain
        run: ${{ matrix.task }}
