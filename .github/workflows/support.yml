---
# linting and formatting for support code that is not part of the project
name: stratisd support CI

on:
  push:
    branches:
      - master
    paths:
      - ".packit.yaml"
      - "plans/**"
      - "tests-fmf/**"
      - "**/*.yml"
      - "tests/**"
      - "!tests/**/README.*"
  pull_request:
    branches:
      - master
    paths:
      - ".packit.yaml"
      - "plans/**"
      - "tests-fmf/**"
      - "**/*.yml"
      - "tests/**"
      - "!tests/**/README.*"

  workflow_dispatch:

# cancel the in-progress workflow when PR is refreshed.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  support-checks:
    strategy:
      matrix:
        include:
          - dependencies: >
              libatomic
              python3-dbus-client-gen
              python3-dbus-python-client-gen
              python3-justbytes
              python3-psutil
              python3-pyudev
              python3-semantic_version
              python3-setuptools
              python3-tenacity
              ruff
            task: PATH=${PATH}:/github/home/.local/bin make -f Makefile lint
            working-directory: ./tests/client-dbus
          - dependencies: ruff
            task: make -f Makefile fmt-ci
            working-directory: ./tests/client-dbus
          - dependencies: yamllint tmt
            task: make -f Makefile yamllint tmtlint
            working-directory: .
    runs-on: ubuntu-24.04
    container: fedora:43  # CURRENT DEVELOPMENT ENVIRONMENT
    steps:
      - name: Install dependencies
        run: >
          dnf install -y
          git
          libatomic
          make
          ncurses
          pip
          ${{ matrix.dependencies }}
      - name: Install pyright
        run: pip install --user pyright
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Run test
        run: ${{ matrix.task }}
        working-directory: ${{ matrix.working-directory }}
