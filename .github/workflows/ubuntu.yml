---
name: stratisd CI on ubuntu

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'CHANGES.txt'
      - '**/README.md'
      - 'README_tests.md'
      - 'tests/**'
      - '.packit.yaml'
      - 'plans/**'
      - 'tests-fmf/**'
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'CHANGES.txt'
      - '**/README.md'
      - 'README_tests.md'
      - 'tests/**'
      - '.packit.yaml'
      - 'plans/**'
      - 'tests-fmf/**'

  workflow_dispatch:

# cancel the in-progress workflow when PR is refreshed.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  checks:
    strategy:
      matrix:
        include:
          - task: make -f Makefile clippy
            components: clippy
          - task: PROFILEDIR=debug make -f Makefile build
            components: cargo
          - task: PROFILEDIR=debug make -f Makefile build-min
            components: cargo
          - task: PROFILEDIR=debug make -f Makefile build-min-no-systemd
            components: cargo
          - task: PROFILEDIR=debug make -f Makefile build-utils
            components: cargo
          - task: PROFILEDIR=debug make -f Makefile build-no-ipc
            components: cargo
          - task: PROFILEDIR=debug make -f Makefile stratisd-tools
            components: cargo
          - task: make -f Makefile docs-ci
            components: cargo
          - task: make -f Makefile test
            components: cargo
          - task: make -f Makefile build
            components: cargo
          - task: make -f Makefile build-min
            components: cargo
          - task: make -f Makefile build-no-ipc
            components: cargo
    runs-on: ubuntu-24.04
    container:
      image: ubuntu:noble
      options: --privileged -v /dev:/dev
    steps:
      - name: Install dependencies for Ubuntu
        run: apt-get -q update
      - name: Install dependencies for Ubuntu
        run: >
          DEBIAN_FRONTEND=noninteractive
          apt-get install -y
          clang
          curl
          git
          libblkid-dev
          libcryptsetup-dev
          libdevmapper-dev
          libsystemd-dev
          libudev-dev
          make
          pkg-config
          sudo
          thin-provisioning-tools
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: ${{ matrix.components }}
      - name: Overwrite stratisd dependencies as necessary
        uses: stratis-storage/github-actions/stratisd-modify@HEAD
      - name: Test ${{ matrix.task }} on CURRENT DEVELOPMENT RUST TOOLCHAIN
        run: ${{ matrix.task }}

  # TESTS WITH UDEV
  checks_with_udev:
    strategy:
      matrix:
        include:
          - task: RUST_LOG=stratisd=debug make -f Makefile test-loop-root
            components: cargo
    runs-on: ubuntu-24.04
    container:
      image: ubuntu:noble
      options: --privileged -v /dev:/dev -v /run/udev:/run/udev -v /usr/lib/udev:/usr/lib/udev --ipc=host
    steps:
      - name: Install dependencies for Ubuntu
        run: apt-get -q update
      - name: Install dependencies for Ubuntu
        run: >
          DEBIAN_FRONTEND=noninteractive
          apt-get install -y
          asciidoc
          clang
          cryptsetup
          curl
          git
          libblkid-dev
          libcryptsetup-dev
          libdevmapper-dev
          libsystemd-dev
          libudev-dev
          make
          pkg-config
          sudo
          systemd
          thin-provisioning-tools
          udev
          xfsprogs
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: ${{ matrix.components }}
      - name: Overwrite stratisd dependencies as necessary
        uses: stratis-storage/github-actions/stratisd-modify@HEAD
      - name: Build stratisd
        run: PROFILEDIR=debug make -f Makefile build-all
      - name: Install stratisd
        run: PROFILEDIR=debug make -f Makefile install
      - name: Reload udev
        run: udevadm control --reload
      - name: Test ${{ matrix.task }} on ${{ matrix.toolchain }} toolchain
        run: ${{ matrix.task }}

  checks_with_tang_should_fail:
    strategy:
      matrix:
        include:
          - task: >-
              TANG_URL=localhost
              make -f Makefile test-clevis-loop-should-fail-root
            components: cargo
    runs-on: ubuntu-24.04
    container:
      image: ubuntu:noble
      options: --privileged -v /dev:/dev -v /run/udev:/run/udev -v /usr/lib/udev:/usr/lib/udev --ipc=host
    steps:
      - name: Install dependencies for Ubuntu
        run: apt-get -q update
      - name: Install dependencies for Ubuntu
        run: >
          DEBIAN_FRONTEND=noninteractive
          apt-get install -y
          asciidoc
          clang
          curl
          git
          libblkid-dev
          libcryptsetup-dev
          libdevmapper-dev
          libsystemd-dev
          libudev-dev
          make
          pkg-config
          sudo
          systemd
          thin-provisioning-tools
          udev
          xfsprogs
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: ${{ matrix.components }}
      - name: Overwrite stratisd dependencies as necessary
        uses: stratis-storage/github-actions/stratisd-modify@HEAD
      - name: Build stratisd
        run: PROFILEDIR=debug make -f Makefile build-all
      - name: Install stratisd
        run: PROFILEDIR=debug make -f Makefile install
      - name: Reload udev
        run: udevadm control --reload
      - name: Test ${{ matrix.task }} on ${{ matrix.toolchain }} toolchain
        run: ${{ matrix.task }}
